name: Envy CI/CD Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/**/*"
      - "packages/**/*"
  pull_request:
    paths:
      - "apps/**/*"
      - "packages/**/*"

permissions:
  contents: read

jobs:
  lint:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linters
        run: turbo run lint

  unit-test:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: turbo run test:unit

  integration-test:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
    services:
      postgres:
        image: docker.io/library/postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        run: turbo run test:integration

  e2e-test:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
    services:
      postgres:
        image: docker.io/library/postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run end-to-end tests
        run: turbo run test:e2e

  test:
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    env:
      PORT: 8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
    services:
      postgres:
        image: docker.io/library/postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all tests
        run: turbo run test
