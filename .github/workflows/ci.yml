name: Envy CI/CD Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/**/*"
      - "packages/**/*"
  pull_request:
    paths:
      - "apps/**/*"
      - "packages/**/*"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linters
        run: turbo run lint

