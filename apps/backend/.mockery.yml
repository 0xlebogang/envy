all: false
dir: '{{.InterfaceDir}}'
filename: mocks_test.go
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: false
log-level: info
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: '{{.SrcPackageName}}'
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
  github.com/0xlebogang/envy/backend/internal/domain/user:
    config:
      all: true
  github.com/0xlebogang/envy/backend/internal/utils:
    config:
      all: true
      pkgName: "{{.SrcPackageName}}_mocks"
      filename: "{{.SrcPackageName}}_mocks/mocks.go"
