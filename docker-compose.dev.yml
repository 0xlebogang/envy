volumes:
  pgdata:
    name: pgdata

services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - "pgdata:/var/lib/postgresql/data"
    ports:
      - "5432:5432"
